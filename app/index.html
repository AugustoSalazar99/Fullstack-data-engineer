<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>RoseAmor — Nuevo Pedido</title>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family: system-ui, sans-serif;
        background: #871d1d;
        display: flex;
        justify-content: center;
        padding: 48px 16px;
      }
      .card {
        background: #ffffff;
        border-radius: 12px;
        border: 1px solid #e0e0e0;
        padding: 36px;
        width: 100%;
        max-width: 540px;
      }

      h1 {
        font-size: 20px;
        font-weight: 600;
        margin-bottom: 24px;
      }
      label {
        display: block;
        font-size: 13px;
        font-weight: 500;
        margin-bottom: 6px;
        color: #444;
      }
      input,
      select {
        width: 100%;
        padding: 9px 12px;
        border: 1px solid #d0d0d0;
        border-radius: 8px;
        font-size: 14px;
        margin-bottom: 16px;
        transition: border-color 0.15s;
      }
      input:focus,
      select:focus {
        outline: none;
        border-color: #555;
      }
      button {
        width: 100%;
        padding: 11px;
        background: #111;
        color: #fff;
        border: none;
        border-radius: 8px;
        font-size: 14px;
        font-weight: 500;
        cursor: pointer;
      }
      button:hover {
        background: #333;
      }
      #msg {
        margin-top: 14px;
        font-size: 13px;
        padding: 10px 14px;
        border-radius: 8px;
        display: none;
      }
      .ok {
        background: #e8f5e9;
        color: #2e7d32;
      }
      .err {
        background: #ffebee;
        color: #c62828;
      }
      .row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
      }
      .row > div {
        display: flex;
        flex-direction: column;
      }
      .row input {
        margin-bottom: 0;
      }
    </style>
  </head>

          <h1 style="text-transform: uppercase">Registrar pedido</h1>
        </div>
        <form id="frm">
          <label>Order ID</label>
          <input name="order_id" placeholder="O000001" required />

          <label>Customer ID</label>
          <input name="customer_id" placeholder="C0001" required />

          <label>SKU</label>
          <input name="sku" placeholder="SKU0001" required />

          <div class="row">
            <div>
              <label>Cantidad</label>
              <input
                name="quantity"
                type="number"
                min="1"
                placeholder="1"
                required
              />
            </div>
            <div>
              <label>Precio unitario</label>
              <input
                name="unit_price"
                type="number"
                min="0"
                step="0.01"
                placeholder="0.00"
                required
              />
            </div>
          </div>
          <br />

          <label>Fecha del pedido</label>
          <input name="order_date" type="date" required />

          <label>Canal</label>
          <select name="channel" required>
            <option value="">Seleccionar...</option>
            <option value="retail">Retail</option>
            <option value="ecommerce">Ecommerce</option>
            <option value="wholesale">Wholesale</option>
            <option value="export">Export</option>
          </select>

          <button type="submit">Guardar pedido</button>
          <div id="msg"></div>
        </form>
      </div>

      <div class="card" id="order-list-card">
        <h1 style="text-transform: uppercase; text-align: center">Pedidos</h1>
        <ul id="order-list" style="list-style: none; padding: 0"></ul>
      </div>
      
    </div>
    <script>
     async function loadOrders() {
        const res = await fetch("/orders");
        const orders = await res.json();
        const ul = document.getElementById("order-list");
        ul.innerHTML = "";
        orders.forEach((o) => {
          const li = document.createElement("li");
          li.style = "padding: 10px 0; border-bottom: 1px solid #e0e0e0; font-size: 13px;";
          li.innerHTML = `
            <strong>${o.order_id}</strong> — ${o.customer_id} — ${o.sku}<br>
            <span style="color:#666">Qty: ${o.quantity} | $${o.unit_price} | ${o.order_date} | ${o.channel}</span>
          `;
          ul.appendChild(li);
        });
      }

      document.getElementById("frm").addEventListener("submit", async (e) => {
        e.preventDefault();
        const data = Object.fromEntries(new FormData(e.target));
        const res = await fetch("/orders", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(data),
        });
        const json = await res.json();
        const el = document.getElementById("msg");
        el.style.display = "block";
        el.className = res.ok ? "ok" : "err";
        el.textContent = json.message || json.error;
        if (res.ok) {
          e.target.reset();
          loadOrders();
        }
      });

      loadOrders();
    </script>
  </body>
